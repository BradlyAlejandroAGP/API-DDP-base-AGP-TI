name: Deploy Pricing Process Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout API repo
        uses: actions/checkout@v4

      - name: Checkout Frontend de Maria
        uses: actions/checkout@v4
        with:
          repository: AGP-Corp/pricing-process-automation
          token: ${{ secrets.GH_PAT_MARIA_REPO }}
          path: frontend-source

      - name: Copiar HTML de Maria
        run: |
          mkdir -p frontend
          cp frontend-source/pricing_vidrio_laminado_v4_50.html frontend/index.html
          echo "Frontend copiado"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Crear estructura de inicio para Azure
        run: |
          echo "web: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000" > Procfile

