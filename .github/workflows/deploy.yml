name: Deploy Pricing Process Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout API repo (este repo)
        uses: actions/checkout@v4

      - name: Checkout Frontend de Maria
        uses: actions/checkout@v4
        with:
          repository: AGP-Corp/pricing-process-automation
          token: ${{ secrets.GH_PAT_MARIA_REPO }}
          path: frontend-source

      - name: Copiar HTML de Maria al frontend de la API
        run: |
          mkdir -p frontend
          cp frontend-source/pricing_vidrio_laminado_v4_50.html frontend/index.html
          echo "Frontend copiado correctamente"
          ls -la frontend/

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Login a Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: bd16e31f-bdf1-4006-8d32-617df0c1e092

      - name: Deploy a Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pricing-process-automation'
          package: .